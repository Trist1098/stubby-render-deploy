<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-ui.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/core/auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <div class="container">
            <nav id="navbar" class="navbar navbar-expand-lg py-3">
                <div class="container-fluid p-0">
                    <a href="home.html" class="d-flex align-items-center gap-2 text-decoration-none">
                        <h3 class="fw-bold fs-3 text-primary mb-0">Stubby</h3>
                    </a>
                    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="collapse navbar-collapse" id="navContent">
                        <ul class="navbar-nav mx-auto gap-2" id="nav-links">
                            <li class="nav-item"><a href="home.html" class="nav-link">Dashboard</a></li>
                            <li class="nav-item dropdown">
                                <a href="matchmaking.html" class="nav-link dropdown-toggle d-flex align-items-center gap-1" data-bs-toggle="dropdown">
                                    Matchmaking 
                                    <i class="fas fa-chevron-down nav-dropdown-icon ms-1"></i>
                                </a>
                                <ul class="dropdown-menu shadow border-0 mt-2 rounded-4 p-2">
                                    <li><a class="dropdown-item py-2 rounded-3" href="matchmaking.html?tab=browse">Browse Matches</a></li>
                                    <li><a class="dropdown-item py-2 rounded-3" href="matchmaking.html?tab=requests">My Requests</a></li>
                                </ul>
                            </li>
                            <li class="nav-item"><a href="sessions.html" class="nav-link">Sessions</a></li>
                            <li class="nav-item"><a href="chat.html" class="nav-link active">Chat</a></li>
                        </ul>
                        <ul class="navbar-nav">
                            <li class="nav-item" id="auth-link"></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="flex-grow-1 d-flex overflow-hidden chat-main">
        <!-- Sidebar: conversation list -->
        <aside class="chat-sidebar d-flex flex-column border-end">
            <div class="chat-sidebar-header d-flex align-items-center justify-content-between p-3 border-bottom">
                <h6 class="fw-bold mb-0">Conversations</h6>
                <button class="btn btn-primary btn-sm" id="newChatBtn" title="New Chat">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            <div class="px-2 py-2 border-bottom">
                <input class="form-control form-control-sm" id="convSearchInput" type="text" placeholder="Search conversations..." autocomplete="off">
            </div>
            <div class="chat-list flex-grow-1 overflow-auto" id="conversationList">
                <div class="text-center text-muted py-5 small" id="convoPlaceholder">
                    No conversations yet.<br>Click <strong>New Chat</strong> to start one.
                </div>
            </div>
        </aside>

        <!-- Main chat panel -->
        <section class="chat-panel flex-grow-1 d-flex flex-column" id="chatPanel">
            <div class="text-center text-muted">
                <i class="fas fa-comments fa-3x mb-3 opacity-25"></i>
                <p class="mb-0">Select a conversation or create a new one</p>
            </div>
        </section>
    </main>

    <!-- New Chat Modal -->
    <div class="modal fade" id="newChatModal" tabindex="-1" aria-labelledby="newChatModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title fw-bold" id="newChatModalLabel">New Conversation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Type selector -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Type</label>
                        <div class="d-flex gap-2">
                            <input type="radio" class="btn-check" name="chatType" id="typeFriend" value="friend" checked>
                            <label class="btn btn-outline-primary btn-sm" for="typeFriend">
                                <i class="fas fa-user me-1"></i> 1-to-1
                            </label>
                            <input type="radio" class="btn-check" name="chatType" id="typeGroup" value="group">
                            <label class="btn btn-outline-primary btn-sm" for="typeGroup">
                                <i class="fas fa-users me-1"></i> Group
                            </label>
                        </div>
                    </div>

                    <!-- Group name (only for group) -->
                    <div class="mb-3 d-none" id="groupNameField">
                        <label for="groupName" class="form-label fw-semibold">Group Name</label>
                        <input type="text" class="form-control" id="groupName" placeholder="Enter group name">
                    </div>

                    <!-- Friend selector (1-to-1) -->
                    <div class="mb-3" id="friendSelectField">
                        <label for="friendSelect" class="form-label fw-semibold">Select Friend</label>
                        <select class="form-select" id="friendSelect">
                            <option value="" disabled selected>Loading friends...</option>
                        </select>
                    </div>

                    <!-- Multi-friend selector (group) -->
                    <div class="mb-3 d-none" id="groupMembersField">
                        <label class="form-label fw-semibold">Add Members</label>
                        <div id="friendCheckboxList" class="border rounded p-2" style="max-height:180px;overflow-y:auto;">
                            <span class="text-muted small">Loading friends...</span>
                        </div>
                    </div>

                    <div id="modalError" class="alert alert-danger d-none py-2 small"></div>
                </div>
                <div class="modal-footer border-top">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-sm" id="createChatBtn">
                        <span id="createBtnText">Create</span>
                        <span class="spinner-border spinner-border-sm d-none" id="createSpinner"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/navbar.js"></script>
    <script type="module" src="js/chat/chat.js"></script>
</body>
</html>
