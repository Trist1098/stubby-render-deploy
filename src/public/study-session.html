<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stubby - Study Session</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="study-session-body">
    <header>
      <div class="container">
        <nav id="navbar" class="navbar navbar-expand-lg py-3">
          <div class="container-fluid p-0">
            <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none">
              <h3 class="fw-bold fs-3 text-primary mb-0">Stubby</h3>
            </a>

            <button
              class="navbar-toggler border-0"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navContent"
            >
              <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
              <ul class="navbar-nav mx-auto gap-2 study-nav-links" id="nav-links">
                <li class="nav-item">
                  <a href="index.html" class="nav-link study-nav-link">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="study-session.html" class="nav-link study-nav-link active">
                    <i class="fas fa-layer-group"></i>
                    <span>Study</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="matchmaking.html" class="nav-link study-nav-link">
                    <i class="fas fa-user-friends"></i>
                    <span>Match</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="chat.html" class="nav-link study-nav-link">
                    <i class="far fa-comment"></i>
                    <span>Chat</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="profile.html" class="nav-link study-nav-link">
                    <i class="far fa-user"></i>
                    <span>Profile</span>
                  </a>
                </li>
              </ul>
              <ul class="navbar-nav">
                <li class="nav-item" id="auth-link"></li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="session-web-shell">
      <section class="session-screen" aria-labelledby="sessionTitle">
        <div class="session-topbar">
          <div>
            <span class="session-kicker">Study Session</span>
            <h1 id="sessionTitle">Software Engineering Practice</h1>
          </div>
          <button
            id="exitSessionButton"
            class="session-icon-btn"
            type="button"
            aria-label="Exit session"
          >
            <i class="fas fa-door-open"></i>
            <span>Exit Session</span>
          </button>
        </div>

        <div id="sessionMessage" class="session-alert d-none"></div>

        <section class="session-focus-card">
          <div class="timer-ring" aria-label="Session countdown timer">
            <span id="countdownTimer">37:50</span>
          </div>

          <div class="micro-goal-area">
            <span class="session-label">Micro-goal</span>
            <div class="micro-goal-heading-row">
              <h2 id="currentGoalTitle">Finish Tutorial Q1-Q3</h2>
              <div class="micro-goal-actions">
                <button
                  id="viewQueueButton"
                  class="queue-goal-btn"
                  type="button"
                  aria-label="View queued micro-goals"
                >
                  <i class="fas fa-list-ul"></i>
                  <span id="queuedGoalCount">0</span>
                </button>
                <button
                  id="showGoalFormButton"
                  class="add-goal-btn"
                  type="button"
                  aria-label="Add micro-goal"
                >
                  <i class="fas fa-plus"></i>
                </button>
              </div>
            </div>
            <div id="nextQueuedGoal" class="queued-goal-preview d-none"></div>
            <p id="currentGoalDescription">Current task for this study session.</p>

            <form id="microGoalForm" class="micro-goal-form d-none">
              <input
                id="microGoalTitleInput"
                name="title"
                type="text"
                maxlength="255"
                placeholder="New micro-goal"
                required
              />
              <button type="submit">Add</button>
            </form>
          </div>
        </section>

        <section class="members-box" aria-labelledby="membersTitle">
          <div class="members-header">
            <h2 id="membersTitle">Members</h2>
          </div>
          <div id="membersList" class="members-list"></div>
        </section>
      </section>
    </main>

    <div
      id="queueModal"
      class="session-modal d-none"
      role="dialog"
      aria-modal="true"
      aria-labelledby="queueModalTitle"
    >
      <section class="session-modal-card queue-modal-card">
        <div class="session-modal-header">
          <h2 id="queueModalTitle">Queued Micro-goals</h2>
          <button
            id="closeQueueButton"
            class="modal-icon-button"
            type="button"
            aria-label="Close queue"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="queuedGoalsList" class="queued-goals-list"></div>
      </section>
    </div>

    <div
      id="exitModal"
      class="session-modal d-none"
      role="dialog"
      aria-modal="true"
      aria-labelledby="exitModalTitle"
    >
      <section class="session-modal-card">
        <h2 id="exitModalTitle">Exit Session?</h2>
        <p>End the current study session and return to sessions.</p>
        <div class="session-modal-actions">
          <button id="confirmExitButton" class="btn btn-danger" type="button">Exit</button>
          <button id="cancelExitButton" class="btn btn-light" type="button">Stay</button>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/navbar.js"></script>
    <script src="js/sessionPage/studySessionPage.js"></script>
  </body>
</html>
