<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stubby - Personal Summary</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/study-session.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="study-session-body">
    <header>
      <div class="container">
        <nav id="navbar" class="navbar navbar-expand-lg py-3">
          <div class="container-fluid p-0">
            <a href="home.html" class="d-flex align-items-center gap-2 text-decoration-none">
              <h3 class="fw-bold fs-3 text-primary mb-0">Stubby</h3>
            </a>

            <button
              class="navbar-toggler border-0"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navContent"
            >
              <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
              <ul class="navbar-nav mx-auto gap-2 study-nav-links" id="nav-links">
                <li class="nav-item">
                  <a href="home.html" class="nav-link study-nav-link">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="study-session.html" class="nav-link study-nav-link active">
                    <i class="fas fa-layer-group"></i>
                    <span>Study</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="matchmaking.html" class="nav-link study-nav-link">
                    <i class="fas fa-user-friends"></i>
                    <span>Match</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="chat.html" class="nav-link study-nav-link">
                    <i class="far fa-comment"></i>
                    <span>Chat</span>
                  </a>
                </li>
                <li class="nav-item">
                  <a href="profile.html" class="nav-link study-nav-link">
                    <i class="far fa-user"></i>
                    <span>Profile</span>
                  </a>
                </li>
              </ul>
              <ul class="navbar-nav">
                <li class="nav-item" id="auth-link"></li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="session-web-shell">
      <section class="session-topbar" aria-labelledby="personalSummaryTitle">
        <div>
          <span class="session-kicker">Personal Summary</span>
          <h1 id="personalSummaryTitle">Personal Summary</h1>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/navbar.js"></script>
  </body>
</html>
