<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-white d-flex align-items-center justify-content-center min-vh-100 py-5 m-0 p-0">
    <div class="text-center w-100 small-container">
        <div class="mb-4">
            <img src="images/logo.png" alt="Stubby Logo" class="w-100 object-fit-cover">
        </div>
        
        <h1 class="fw-bold mb-2 title">Create Account</h1>
        <p class="text-muted mb-5">Join the student community today</p>
        
        <form id="registerForm" class="text-start">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">FULL NAME</label>
                <input type="text" id="name" class="form-control form-control-lg" placeholder="John Doe">
                <div class="error-message" id="errName"></div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">USERNAME</label>
                <input type="text" id="username" class="form-control form-control-lg" placeholder="johndoe">
                <div class="error-message" id="errUsername"></div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                <input type="email" id="email" class="form-control form-control-lg" placeholder="johndoe@ichat.sp.edu.sg">
                <div class="error-message" id="errEmail"></div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••">
                <div class="error-message" id="errPassword"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm">Sign Up</button>
        </form>
        
        <p class="mt-4 text-muted">
            Already have an account? <a href="login.html" class="text-decoration-none fw-bold text-primary">Sign in</a>
        </p>
    </div>

    <script src="js/core/auth.js"></script>
    <script src="js/auth/registerUser.js"></script>
</body>
</html>
