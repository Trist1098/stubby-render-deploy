<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shared-ui.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/core/auth.js"></script>
</head>
<body class="auth-body">

    <!-- Left: Brand panel -->
    <div class="auth-left">
        <a href="index.html" class="auth-brand">Stubby</a>

        <h1 class="auth-left-headline">
            Study smarter,<br>
            <span class="accent">together.</span>
        </h1>
        <p class="auth-left-sub">
            Connect with students who share the same modules, schedule, and goals.
        </p>

        <div class="auth-feature-list">
            <div class="auth-feature-item">
                <span class="check"><i class="fas fa-check"></i></span>
                Match by module, not just availability
            </div>
            <div class="auth-feature-item">
                <span class="check"><i class="fas fa-check"></i></span>
                Schedule sessions without leaving the app
            </div>
            <div class="auth-feature-item">
                <span class="check"><i class="fas fa-check"></i></span>
                Chat, track progress, earn badges
            </div>
        </div>
    </div>

    <!-- Right: Form panel -->
    <div class="auth-right">
        <div class="auth-card">
            <h2 class="auth-card-title">Welcome back</h2>
            <p class="auth-card-sub">Sign in to continue to Stubby</p>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label-custom">Email or Username</label>
                    <div class="input-wrap">
                        <input type="text" id="identifier" placeholder="yourname@ichat.sp.edu.sg" autocomplete="username">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    <div class="error-message" id="errIdentifier"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label-custom">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                    <div class="error-message" id="errPassword"></div>
                </div>

                <button type="submit" class="btn-auth">
                    Sign In
                    <i class="fas fa-arrow-right fa-sm"></i>
                </button>
            </form>

            <p class="auth-footer-text">
                Don't have an account? <a href="register.html">Sign up</a>
            </p>
        </div>
    </div>

    <script src="js/auth/loginUser.js"></script>
</body>
</html>
