<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-white d-flex align-items-center justify-content-center vh-100 m-0 p-0">
    <div class="text-center w-100 small-container">
        <div class="mb-4">
            <img src="images/logo.png" alt="Stubby Logo" class="w-100 object-fit-cover">
        </div>
        
        <h1 class="fw-bold mb-2 title">Welcome Back</h1>
        <p class="text-muted mb-5">Log in to your account to continue</p>
        
        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">EMAIL OR USERNAME</label>
                <input type="text" id="identifier" class="form-control form-control-lg" placeholder="yourname@ichat.sp.edu.sg">
                <div class="error-message" id="errIdentifier" style="display: none;"></div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••">
                <div class="error-message" id="errPassword"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm">Sign In</button>
        </form>
        
        <p class="mt-4 text-muted">
            Don't have an account? <a href="register.html" class="text-decoration-none fw-bold text-primary">Sign up</a>
        </p>
    </div>

    <script src="js/core/auth.js"></script>
    <script src="js/auth/loginUser.js"></script>
</body>
</html>
