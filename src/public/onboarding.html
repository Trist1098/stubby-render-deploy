<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby - Complete Your Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="onboarding-card">
        <div class="text-center mb-5">
            <h2 class="fw-bold mb-2">Welcome to Stubby!</h2>
            <p class="text-muted">Let's set up your academic profile to help you find the best study partners.</p>
            
            <div class="d-flex justify-content-center mt-4">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
            </div>
        </div>

        <!-- Step 1: Academic Details -->
        <div id="step1">
            <h5 class="fw-bold mb-4"><i class="fas fa-graduation-cap text-primary me-2"></i> Academic Details</h5>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">INSTITUTION</label>
                <select id="institutionId" class="form-select form-select-lg rounded-4 text-muted">
                    <option value="" selected disabled>Select your school</option>
                </select>
                <div class="error-message" id="errInstitution"></div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">DIPLOMA / MAJOR</label>
                <select id="diplomaId" class="form-select form-select-lg rounded-4 text-muted" disabled>
                    <option value="" selected disabled>Select your diploma</option>
                </select>
                <div class="error-message" id="errDiploma"></div>
            </div>
            <div class="mb-5">
                <label class="form-label small fw-bold text-muted">CURRENT YEAR</label>
                <select id="year" class="form-select form-select-lg rounded-4">
                    <option value="1">Year 1</option>
                    <option value="2">Year 2</option>
                    <option value="3">Year 3</option>
                    <option value="4">Year 4</option>
                </select>
            </div>
            <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm" id="btnNext1">Continue <i class="fas fa-arrow-right ms-2"></i></button>
        </div>

        <!-- Step 2: Module Selection -->
        <div id="step2" class="d-none">
            <h5 class="fw-bold mb-2"><i class="fas fa-book text-primary me-2"></i> Your Modules</h5>
            <p class="text-muted small mb-4">Select the modules you are currently enrolled in.</p>
            
            <div id="moduleList" class="row g-2 mb-5">
                <!-- Dynamically loaded -->
                <div class="col-12 text-center py-4">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
            <div class="error-message mb-4" id="errModules"></div>

            <div class="d-flex gap-2">
                <button class="btn btn-light px-4 py-3 fw-bold rounded-pill border" id="btnBack2">Back</button>
                <button class="btn btn-primary flex-grow-1 py-3 fw-bold rounded-pill shadow-sm" id="btnFinish">Finish Setup</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-5 text-center p-5">
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
                </div>
                <h3 class="fw-bold mb-2">PROFILE READY!</h3>
                <p class="text-muted mb-4">Welcome to the community. You can now start matching with study partners.</p>
                <button type="button" id="btnGoToDashboard" class="btn btn-accent w-100 py-3 rounded-4 fw-bold">Let's Go!</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/auth/onboarding.js"></script>
</body>
</html>
