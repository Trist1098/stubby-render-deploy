<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stubby - Complete Your Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/core/auth.js"></script>
</head>
<body class="ob-body">

    <div class="ob-shell">

        <!-- Header / progress -->
        <div class="ob-header">
            <a href="index.html" class="ob-brand">Stubby</a>

            <div class="ob-progress-track">
                <div class="ob-step-node">
                    <div class="ob-step-circle active" id="circle1">1</div>
                    <div class="ob-step-label active" id="label1">Academic</div>
                </div>
                <div class="ob-step-line" id="line1"></div>
                <div class="ob-step-node">
                    <div class="ob-step-circle" id="circle2">2</div>
                    <div class="ob-step-label" id="label2">Modules</div>
                </div>
            </div>

            <h1 class="ob-title" id="obTitle">Build Your Profile</h1>
            <p class="ob-subtitle" id="obSubtitle">Add your academic details so Stubby can recommend better study partners.</p>
        </div>

        <!-- Card -->
        <div class="ob-card">

            <!-- Step 1: Academic details -->
            <div id="step1">
                <div class="mb-4">
                    <label class="ob-section-label">Institution</label>
                    <select id="institutionId" class="ob-select">
                        <option value="" selected disabled>Select an institution</option>
                    </select>
                    <div class="error-message" id="errInstitution"></div>
                </div>

                <div class="mb-4">
                    <label class="ob-section-label">Course / Major</label>
                    <select id="diplomaId" class="ob-select" disabled>
                        <option value="" selected disabled>Select a diploma</option>
                    </select>
                    <div class="error-message" id="errDiploma"></div>
                </div>

                <div class="mb-5">
                    <label class="ob-section-label">Current Year</label>
                    <select id="year" class="ob-select">
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3">Year 3</option>
                        <option value="4">Year 4</option>
                    </select>
                </div>

                <button class="btn-ob-primary" id="btnNext1">
                    Continue
                    <i class="fas fa-arrow-right fa-sm"></i>
                </button>
            </div>

            <!-- Step 2: Module selection -->
            <div id="step2" class="d-none">
                <div class="mb-4">
                    <label class="ob-section-label">Enrolled Modules</label>
                    <p class="ob-hint">Stubby uses them to rank compatible partners.</p>

                    <div id="moduleList" class="module-grid">
                        <div class="ob-spinner-wrap">
                            <div class="spinner-border text-primary ob-spinner"></div>
                        </div>
                    </div>
                    <div class="error-message mt-2" id="errModules"></div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button class="btn-ob-secondary" id="btnBack2">
                        <i class="fas fa-arrow-left fa-sm me-1"></i> Back
                    </button>
                    <button class="btn-ob-primary" id="btnFinish">
                        Finish Setup
                        <i class="fas fa-check fa-sm"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 dialog-surface text-center p-5">
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
                </div>
                <h3 class="fw-bold mb-2">Profile Ready!</h3>
                <p class="text-muted mb-4">Your academic profile is ready. Stubby can now recommend study partners based on your course and modules.</p>
                <button type="button" id="btnGoToDashboard" class="btn btn-accent w-100 py-3 rounded-4 fw-bold">
                    Go to Dashboard
                    <i class="fas fa-arrow-right fa-sm ms-1"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth/onboarding.js"></script>
</body>
</html>
